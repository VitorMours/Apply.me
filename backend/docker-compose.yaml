services:
  backend:
    build: ./ 
    container_name: apply-backend
    ports:
      - "8000:8000"
    environment:
    - MONGODB_URL=mongodb://mongo_db:27017/meu_banco
    - IS_LOCAL=True
    depends_on:
        - mongo_db
    restart: always

  mongo_db:
    image: mongo:latest
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data: